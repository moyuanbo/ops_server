{% extends "base.html" %}

{% block content %}
<div class="card shadow">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">用户列表</h5>
        <!-- 刷新按钮（异步加载） -->
        <button id="refreshUsers" class="btn btn-sm btn-primary">
            <i class="fas fa-sync-alt"></i> 刷新列表
        </button>
    </div>
    <div class="card-body">
        <!-- 异步加载的用户表格 -->
        <div id="usersTable">
            <div class="text-center py-3">
                <span class="loading"></span> 加载中...
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
// 页面加载时自动刷新用户列表
$(document).ready(function() {
    refreshUserList();
});

// 刷新按钮点击事件
$('#refreshUsers').click(function() {
    refreshUserList();
});

// 异步加载用户列表
function refreshUserList() {
    const $tableContainer = $('#usersTable');
    $tableContainer.html('<div class="text-center py-3"><span class="loading"></span> 加载中...</div>');

    // 调用API（带CSRF Token）
    $.ajax({
        url: '{{ url_for("api.get_users") }}',
        type: 'GET',
        headers: {
            'X-CSRFToken': '{{ csrf_token() }}'  // CSRF保护
        },
        success: function(users) {
            if (users.length === 0) {
                $tableContainer.html(`
                    <div class="empty-state">
                        <i class="fas fa-user-slash"></i>
                        <h5>暂无用户</h5>
                        <p>点击"创建用户"添加新用户</p>
                    </div>
                `);
                return;
            }

            // 生成表格HTML
            let tableHtml = `
                <table class="table table-hover table-striped">
                    <thead class="table-light">
                        <tr>
                            <th>用户名</th>
                            <th>真实姓名</th>
                            <th>邮箱</th>
                            <th>角色</th>
                            <th>创建时间</th>
                            <th>最后登录</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            users.forEach(user => {
                const roleLabel = user.is_admin 
                    ? '<span class="badge bg-primary admin-only">管理员</span>' 
                    : '<span class="badge bg-secondary">普通用户</span>';
                
                tableHtml += `
                    <tr>
                        <td>${user.username}</td>
                        <td>${user.real_name}</td>
                        <td>${user.email}</td>
                        <td>${roleLabel}</td>
                        <td>${new Date(user.created_at).toLocaleString()}</td>
                        <td>${user.last_login ? new Date(user.last_login).toLocaleString() : '未登录'}</td>
                    </tr>
                `;
            });

            tableHtml += `
                    </tbody>
                </table>
            `;

            $tableContainer.html(tableHtml);
        },
        error: function(xhr, status, error) {
            $tableContainer.html(`
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-circle"></i> 加载失败：${xhr.responseJSON?.error || '网络错误'}
                </div>
            `);
        }
    });
}
</script>
{% endblock %}
